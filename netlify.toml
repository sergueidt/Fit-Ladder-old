# ═══════════════════════════════════════════
#   Fit Ladder — Configuración Netlify
# ═══════════════════════════════════════════

# ── HTML: sin caché (cambios visibles al instante)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# ── JS: caché 1 año
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── CSS: caché 1 año
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Imágenes: caché 1 año
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
