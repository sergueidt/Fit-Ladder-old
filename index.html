<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fit Ladder</title>
    <meta name="theme-color" content="#2563eb">
    <link id="pwa-manifest" rel="manifest">
    <link rel="apple-touch-icon" id="apple-icon">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- PANTALLA LOGIN (fuera del #app) -->
    <div id="login-screen" style="display: flex; position: fixed; inset: 0; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">

        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: var(--blue); line-height: 0.8; margin: 0; letter-spacing: -2px;">FIT<br>LADDER</h1>
            <div style="height: 4px; width: 60px; background: var(--blue); margin: 15px auto;"></div>
            <p style="font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 4px; color: var(--text); opacity: 0.8;">TU DIARIO DE PROGRESOS</p>
        </div>

        <div style="width: 100%; max-width: 360px;">

            <div style="margin-bottom: 15px;">
                <div style="font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 900; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;">Email del Atleta</div>
                <input id="login-email" type="email" placeholder="ejemplo@correo.com"
                    style="width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 16px; padding: 15px; outline: none; transition: border 0.3s ease;">
            </div>

            <div style="margin-bottom: 25px;">
                <div style="font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 900; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;">Contraseña</div>
                <input id="login-pass" type="password" placeholder="••••••••"
                    style="width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 16px; padding: 15px; outline: none;">
            </div>

            <button id="btn-login" onclick="iniciarSesion(document.getElementById('login-email').value, document.getElementById('login-pass').value)"
                style="width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 12px; font-family: 'Barlow', sans-serif; font-size: 16px; font-weight: 900; padding: 18px; cursor: pointer; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);">
                ENTRAR AL BOX
            </button>

            <div style="margin-top: 30px; text-align: center;">
                <p style="font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--muted);">¿Eres nuevo?</p>
                <button onclick="openModal('modal-registro')"
                    style="background: none; border: none; color: var(--blue); font-family: 'Barlow', sans-serif; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 5px;">
                    Crear cuenta de Atleta
                </button>
            </div>

            <button onclick="resetearPassword(document.getElementById('login-email').value)"
                style="width: 100%; margin-top: 25px; background: none; border: none; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 12px; cursor: pointer; opacity: 0.6;">
                Olvidé mi acceso
            </button>
        </div>
    </div>

    <!-- MODAL REGISTRO (fuera del #app) -->
    <div id="modal-registro" class="modal-overlay" style="display: none;">
        <div class="modal-card" style="width: 90%; max-width: 400px;">
            <h2 style="font-family: var(--fd); font-size: 1.8rem;">Crear Cuenta</h2>
            <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Únete a los 50 atletas de Fit Ladder</p>

            <input type="text" id="reg-nombre" placeholder="Nombre completo" class="input-style" style="margin-bottom: 1rem; width: 100%;">
            <input type="email" id="reg-email" placeholder="Correo electrónico" class="input-style" style="margin-bottom: 1rem; width: 100%;">
            <input type="password" id="reg-pass" placeholder="Contraseña (mín. 6 caracteres)" class="input-style" style="margin-bottom: 1.5rem; width: 100%;">

            <div style="display: flex; gap: 1rem;">
                <button onclick="closeModal('modal-registro')" class="btn-secondary" style="flex: 1;">Cancelar</button>
                <button onclick="registrarUsuario(document.getElementById('reg-email').value, document.getElementById('reg-pass').value, document.getElementById('reg-nombre').value)"
                    class="btn-blue" style="flex: 2; padding: 0.8rem; border-radius: 12px;">CREAR CUENTA</button>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL (oculta hasta autenticarse) -->
    <div id="app" style="display: none;">
        <!-- Dashboard y módulos irán aquí -->
    </div>

    <script src="./js/firebase-config.js"></script>
    <script src="./js/ui-logic.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
